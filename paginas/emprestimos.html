    <meta charset="UTF-8" />

  <body>
  <div id="menu-container"></div>
	<main class="container">
		<h2>Emprestimos</h2>
	
   
   <h2>Controle de Emprestimos</h2>
   <form class="formulario" id="formEmprestimo">
    <label for="nome">Aluno(a):</label>
    <input type="text" id="nome" placeholder="Digite o seu nome"required/>

    <label for="autor">Livro:</label>
    <input type="text" id="name" placeholder="Digite o nome do livro" required/>

    <label for="ano">Data do Empréstimo:</label>
    <input type="date" id="emprestimo"required/>

    <label for="ano">Data de Devolução:</label>
    <input type="date" id="Devolução"required/>

    <button type="submit">Registrar Empréstimo</button>
  </form>

<h2>Histórico de Empréstimos</h2>
<div class="tabela-container">
<table class="tabela-emprestimos">

    <thead>
        <tr>
            <th>Aluno</th>
            <th>Livro</th>
            <th>Empréstimo</th>
            <th>Devolução</th>
            <th>Status</th>
            <th>Ação</th>
        </tr>
    </thead>
    <!-- usar no js esse id para preencher com js -->
    <tbody id="corpoTabela"> </tbody>

</table>
</div>
	</main>
