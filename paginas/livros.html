<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/menu.css" />
    <title>Livros</title>
  </head>

  <body>
    <div id="menu-container"></div>
	<main class="container">
		<h2>Livros</h2>
	
   <form class="formulario">

    <label for="nome">Título:</label>
    <input type="text" id="nome" placeholder="Digite o título do livro"required/>

    <label for="autor">Autor:</label>
    <input type="text" id="autor" placeholder="Digite o autor" required/>

    <label for="categoria">Categoria:</label>
    <input type="text" id="categoria" placeholder="Digite a categoria" required/>

    <label for="ano">Ano de publicação:</label>
    <input type="number" id="ano"required/>

    <label for="status">Status:</label>
    <select id="status" required>
        <option value="">Selecione</option>
        <option value="Disponível">Disponível</option>
        <option value="Emprestado">Emprestado</option>
    </select>

    <button type="submit">Salvar Livro</button>
  </form>

<h2>Livros Cadastrados</h2>

<div class="tabela-container">
    <table class="tabela-emprestimos">
        <thead>
            <tr>
                <th>Título</th>
                <th>Autor</th>
                <th>Categoria</th>
                <th>Ano</th>
                <th>Status</th>
            </tr>
        </thead>

       <tbody id="corpoTabelaLivros">
</tbody>
    </table>
</div>

  </main>

 <footer class="footer-conteiner">

    </a>

</html>
