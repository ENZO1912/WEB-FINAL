<!DOCTYPE html>
<html lang="en">
<head>

    <title>Registro</title>
    <link rel="stylesheet" href="../css/resgistro.css">
</head>
<body>
    
    <!-- FAZER CSS - COLOCAR DISPLAY FLEX - FLEX DIRECT COLUN -->
    <h2>Criar Conta</h2>

    <section>
        <form class="formulario" id="formResgitro">
            <label for="name">Nome:</label>
            <input type="name" id="name" placeholder="Digite seu nome">

        </form>

    </section>
