<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="../css/resgistro.css">
</head>
<body>
    <main class="container-registro">
     <section class="registro-h2">
       <h2>Criar Conta</h2>
        </section>

    <section class="container-registro">
        <form class="formulario" id="formResgitro">
            <section class="cards-registro">
            <label for="name">Nome:</label>
            <input type="name" id="name" placeholder="Digite seu nome" required>
        </section>

             <section class="cards-registro">
            <label for="email"> E-mail:</label>
            <input type="email" id="email" placeholder="Digite seu nome" required>
            </section>

             <section class="cards-registro"> 
            <label for="senha">Senha:</label>
            <input type="password" id="senha" placeholder="Digite uma senha" required>
             </section>

            <button type="submit">Criar Conta</button>
        </form>
        <span>Já tenho conta</span><a href="../paginas/login.html"> Entrar</a>
    </section>
    </main>
    
</body>
</html>
