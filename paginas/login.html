<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <main class="container-login">
        <section class="login-h2">
            <h2>LOGIN</h2>
        </section>
        
        <form class="card-login" id="formLogin">
            <section class="cards-login">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="Digite seu E-mail" required />
            </section>

            <section class="cards-login">
                <label for="password">Senha:</label>
                <input type="password" id="pwd" placeholder="Digite sua senha" required>
                <input type="checkbox" onclick="pwd.type = this.checked ? 'text' : 'password'"><span>Mostrar</span></input>
                </span>

            </section>

                <!-- fazer a parte de banco de dados e mudar essa parte do link -->
                <button  type="submit">Login</button>
        </form>
       <span>Não possui conta?</span><a href="../paginas/registro.html"> Criar Conta</a>
    </main>

</body>
</html>
